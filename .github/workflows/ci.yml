name: CI

# Reproducible checks on every push and PR. Does NOT require the raw 300k dataset:
# the web app builds from the committed JSON bundle, and the engine tests use fixtures.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (lint · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  engine:
    name: Engine (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas pytest
      - run: python -m pytest tests -q
